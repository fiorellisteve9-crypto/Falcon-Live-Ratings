<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Falcón Live Ratings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121212;--bg2:#1e1e1e;--bg3:#2a2a2a;
  --text:#e0e0e0;--text2:#999;--text3:#666;
  --green:#8BC34A;--red:#f44336;--blue:#42a5f5;
  --border:#333;--hover:#2a2a2a;
  --tab-active:#8BC34A;--tab-bg:#1e1e1e;
  --rank-red:#e57373;--header-green:#8BC34A;
  --gold:#ffd54f;--silver:#b0bec5;--bronze:#ffab40
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent}

/* ─── HEADER ─── */
.header{background:var(--bg);border-bottom:1px solid var(--border);
  padding:14px 16px 10px}
.header-inner{max-width:720px;margin:0 auto;text-align:center}
.header h1{font-size:20px;font-weight:700;color:var(--header-green);
  letter-spacing:-.5px;line-height:1.2}
.header .sub{font-size:11px;color:var(--text3);font-weight:500;
  margin-top:2px;letter-spacing:.3px}

/* ─── DATE ─── */
.date-bar{max-width:720px;margin:0 auto;padding:8px 16px 6px;
  text-align:center}
.date-bar span{font-size:13px;color:var(--text2);font-weight:500}

/* ─── SEARCH ─── */
.search-wrap{max-width:720px;margin:0 auto;padding:4px 16px 8px}
.search-box{display:flex;align-items:center;background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;padding:0 10px;height:34px}
.search-box svg{flex-shrink:0;color:var(--text3)}
.search-box input{flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:13px;font-family:inherit;
  padding:0 8px;height:100%}
.search-box input::placeholder{color:var(--text3)}

/* ─── TABS ─── */
.tabs{max-width:720px;margin:0 auto;padding:0 16px;
  display:flex;gap:2px}
.tab-btn{flex:1;padding:8px 6px;font-size:12px;font-weight:600;
  color:var(--text2);background:var(--tab-bg);border:none;
  cursor:pointer;transition:all .15s;font-family:inherit;
  letter-spacing:.2px;text-align:center}
.tab-btn:first-child{border-radius:6px 0 0 6px}
.tab-btn:last-child{border-radius:0 6px 6px 0}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--tab-active);color:#000;font-weight:700}
.tab-btn .live-badge{display:inline-block;font-size:8px;font-weight:700;
  color:#000;background:rgba(255,255,255,.35);padding:1px 4px;
  border-radius:3px;margin-left:3px;vertical-align:1px}

/* ─── TOURNAMENT HEADER ─── */
.t-header{max-width:720px;margin:0 auto;padding:14px 16px 6px}
.t-header h2{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
.t-header .meta{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500}

/* ─── TABLE ─── */
.table-wrap{max-width:720px;margin:0 auto;padding:2px 0 60px}
.tbl-hdr{display:grid;padding:6px 16px;border-bottom:1px solid var(--border);
  font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.5px}
.tbl-hdr.rk{grid-template-columns:28px 1fr 22px 56px 52px 28px}
.tbl-hdr.tr{grid-template-columns:28px 1fr 22px 50px 56px 52px 28px}
.tbl-hdr span:nth-child(n+4){text-align:right}
.tbl-hdr span:nth-child(3){text-align:center}

.tbl-row{display:grid;align-items:center;padding:9px 16px;
  border-bottom:1px solid #1e1e1e;transition:background .1s;min-height:42px;
  cursor:default}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--hover)}
.tbl-row.rk{grid-template-columns:28px 1fr 22px 56px 52px 28px}
.tbl-row.tr{grid-template-columns:28px 1fr 22px 50px 56px 52px 28px}

/* Rank */
.rank{text-align:center;font-size:13px;font-weight:600;
  color:var(--rank-red);font-variant-numeric:tabular-nums}
.rank.g{color:var(--gold)}
.rank.s{color:var(--silver)}
.rank.b{color:var(--bronze)}

/* Name */
.name{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;padding-right:6px;
  display:flex;align-items:center;gap:6px}

/* Flag */
.flag{width:20px;height:14px;border-radius:2px;object-fit:cover;flex-shrink:0}

/* Pts (tournament) */
.pts{text-align:right;font-size:13px;font-weight:600;color:var(--text);
  font-variant-numeric:tabular-nums}

/* ELO */
.elo{text-align:right;font-size:13px;font-weight:600;color:var(--rank-red);
  font-variant-numeric:tabular-nums}

/* Var */
.var{text-align:right;font-size:12px;font-weight:700;
  font-variant-numeric:tabular-nums}
.var.up{color:var(--green)}
.var.down{color:var(--red)}
.var.flat{color:var(--text3)}

/* Search icon (magnifying glass) */
.search-icon{display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:.4;transition:opacity .15s}
.search-icon:hover{opacity:1}
.search-icon svg{color:var(--text2)}

/* ─── LOADING ─── */
.loading-wrap{max-width:720px;margin:0 auto;padding:80px 16px;text-align:center}
.loading-wrap p{color:var(--text2);font-size:13px}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── EMPTY ─── */
.empty-wrap{max-width:720px;margin:0 auto;padding:80px 16px;text-align:center}
.empty-wrap p{color:var(--text2);font-size:13px;line-height:1.5}

/* ═══════════════════════════════════════
   MODAL — HISTORIAL DEL JUGADOR
   ═══════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:100;align-items:center;justify-content:center;padding:12px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:10px;
  width:100%;max-width:580px;max-height:85vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;
  top:0;background:var(--bg);z-index:2;border-radius:10px 10px 0 0}
.modal-head h3{font-size:15px;font-weight:700;color:var(--header-green)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);
  padding:4px;display:flex}
.modal-close:hover{color:var(--text)}
.modal-body{padding:14px 16px 24px}

/* Modal tables */
.mtbl{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:12px}
.mtbl:last-child{margin-bottom:0}
.mtbl-title{font-size:12px;font-weight:700;color:var(--gold);
  margin:18px 0 8px;text-transform:uppercase;letter-spacing:.5px;
  padding-bottom:4px;border-bottom:1px solid var(--border)}
.mtbl-title:first-child{margin-top:0}
.mtbl th{text-align:left;font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;
  border-bottom:1px solid var(--border)}
.mtbl th.r,.mtbl th.c{text-align:center}
.mtbl td{padding:7px 8px;border-bottom:1px solid #1a1a1a;color:var(--text2);
  font-variant-numeric:tabular-nums}
.mtbl td:first-child{color:var(--text);font-weight:500}
.mtbl td.r,.mtbl td.c{text-align:center}
.mtbl tr:last-child td{border-bottom:none}

/* Partidas table: separate columns, no stacking, horizontal scroll */
.mtbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px 4px;padding:0 16px}
.mtbl-partidas{min-width:480px;table-layout:fixed}
.mtbl-partidas th:nth-child(1),.mtbl-partidas td:nth-child(1){width:78px;white-space:nowrap}
.mtbl-partidas th:nth-child(2),.mtbl-partidas td:nth-child(2){width:28px;text-align:center;white-space:nowrap}
.mtbl-partidas th:nth-child(3),.mtbl-partidas td:nth-child(3){width:38px;text-align:center;white-space:nowrap}
.mtbl-partidas .opp-cell{width:auto;white-space:nowrap;font-weight:500;color:var(--text)}
.mtbl-partidas .torneo-cell{width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;color:var(--text3)}

/* Torneos table: name in one line */
.mtbl-torneos td:nth-child(4){white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtbl-torneos td:nth-child(4) svg{vertical-align:middle;flex-shrink:0}

/* Result colors */
.res-w{color:#4caf50;font-weight:600}
.res-l{color:#f44336;font-weight:600}
.res-d{color:#42a5f5;font-weight:600}
.color-w{color:var(--text)}
.color-b{color:var(--text3)}

/* Score colors */
.score-good{color:#4caf50}
.score-bad{color:#f44336}
.score-mid{color:#ffc107}

/* Ritmo colors */
.ritmo-rapid{color:#8BC34A}
.ritmo-blitz{color:#ffc107}
.ritmo-bullet{color:#e040fb}

/* Ritmo inline SVG icon */
.ri-svg{width:16px;height:16px;vertical-align:middle;margin-right:2px;flex-shrink:0}
.t-header h2{display:flex;align-items:center;gap:6px}

/* ─── RESPONSIVE ─── */
@media(max-width:440px){
  .tbl-hdr.rk,.tbl-row.rk{grid-template-columns:24px 1fr 18px 50px 46px 24px;padding:8px 10px}
  .tbl-hdr.tr,.tbl-row.tr{grid-template-columns:24px 1fr 18px 46px 50px 46px 24px;padding:8px 10px}
  .name{font-size:12px}
  .elo{font-size:12px}
  .var{font-size:11px}
  .pts{font-size:12px}
  .flag{width:18px;height:12px}
}
</style>

// ─── VENEZUELA TIME (America/Caracas = UTC-4) ───
function getVenezuelaTime(){
  try{
    return new Date().toLocaleString("es-VE",{
      timeZone:"America/Caracas",day:"2-digit",month:"short",year:"numeric",
      hour:"2-digit",minute:"2-digit",hour12:false
    });
  }catch(e){
    return new Date().toLocaleString("es-VE");
  }
}

// Format Firebase timestamp (UTC) to Venezuela time
function formatTimestamp(ts){
  if(!ts)return"";
  try{
    // If it's "YYYY-MM-DD HH:MM:SS" assume it's Venezuela local already
    if(ts.includes("/")||ts.match(/^\d{2}/)){
      return ts;
    }
    // Try parsing as ISO or similar
    const d=new Date(ts+(ts.includes("Z")?"":"Z"));
    if(isNaN(d.getTime()))return ts;
    return d.toLocaleString("es-VE",{
      timeZone:"America/Caracas",day:"2-digit",month:"short",year:"numeric",
      hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false
    });
  }catch(e){return ts}
}

// ─── RENDER DATE ───
function updateDate(){
  if(data?.timestamp){
    $('#dateDisplay').textContent=formatTimestamp(data.timestamp);
  }else{
    $('#dateDisplay').textContent=getVenezuelaTime();
  }
}

// ─── RENDER TABS ───
function renderTabs(){
  const el=$("#tabs");
  const has=data?.torneo?.jugadores?.length>0;
  const isLive=data?.torneo&&!data.torneo.finalizado;
  let h=`<button class="tab-btn ${view==='ranking'&&rhythm==='Rapid'?'active':''}" data-v="ranking" data-r="Rapid">Rapid</button>`;
  h+=`<button class="tab-btn ${view==='ranking'&&rhythm==='Blitz'?'active':''}" data-v="ranking" data-r="Blitz">Blitz</button>`;
  h+=`<button class="tab-btn ${view==='ranking'&&rhythm==='Bullet'?'active':''}" data-v="ranking" data-r="Bullet">Bullet</button>`;
  if(has)h+=`<button class="tab-btn ${view==='torneo'?'active':''}" data-v="torneo">Torneo${isLive?'<span class="live-badge">LIVE</span>':''}</button>`;
  el.innerHTML=h;
  el.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
    if(b.dataset.v)view=b.dataset.v;
    if(b.dataset.r){view='ranking';rhythm=b.dataset.r}
    renderTabs();render();
  });
}

// ─── RENDER TABLE HEADER ───
function renderTableHeader(isTorneo){
  const cls=isTorneo?"tr":"rk";
  let h='<div class="tbl-hdr '+cls+'">';
  h+='<span>#</span><span>Nombre</span><span></span>';
  if(isTorneo)h+='<span style="text-align:right">Pts</span>';
  h+='<span>Rating</span><span>+/-</span><span></span>';
  h+='</div>';
  return h;
}

// ─── RENDER RANKING ───
function renderRanking(el){
  const list=data.ranking?.[rhythm]||[];
  if(!list.length){el.innerHTML='<div class="empty-wrap"><p>Sin jugadores en '+rhythm+'</p></div>';return}
  const filtered=searchTerm?list.filter(p=>p.n.toLowerCase().includes(searchTerm.toLowerCase())):list;
  let h=renderTableHeader(false);
  h+='<div class="table-wrap">';
  for(const p of filtered){
    h+=`<div class="tbl-row rk">
      <span class="rank ${rc(p.r)}">${p.r}</span>
      <span class="name">${esc(p.n)}<img class="flag" src="${FLAG_SRC}" alt=""></span>
      <span></span>
      <span class="elo">${p.e}</span>
      <span class="var ${vClass(p.v)}">${p.v>0?"+":""}${p.v||"-"}</span>
      <span class="search-icon" data-player="${esc(p.n)}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
    </div>`;
  }
  h+='</div>';
  el.innerHTML=h;
  bindSearchIcons();
}

// ─── RENDER TORNEO ───
function renderTorneo(el){
  const t=data.torneo;
  if(!t?.jugadores?.length){el.innerHTML='<div class="empty-wrap"><p>Sin datos de torneo</p></div>';return}
  const status=t.finalizado?'Finalizado':`Ronda ${t.ronda} / ${t.rondas_totales}`;
  $('#tHeader').innerHTML=`<div class="t-header"><h2>${ritmoSvg(t.ritmo)} ${esc(t.nombre)}</h2><div class="meta">${status}</div></div>`;
  const filtered=searchTerm?t.jugadores.filter(p=>p.n.toLowerCase().includes(searchTerm.toLowerCase())):t.jugadores;
  let h=renderTableHeader(true);
  h+='<div class="table-wrap">';
  for(const p of filtered){
    const ptsStr=p.pts%1===0?String(p.pts):p.pts.toFixed(1);
    const rj=p.rj||t.rondas_totales;
    const ptsDisplay=ptsStr+'/'+rj;
    h+=`<div class="tbl-row tr">
      <span class="rank ${rc(p.r)}">${p.r}</span>
      <span class="name">${esc(p.n)}<img class="flag" src="${FLAG_SRC}" alt=""></span>
      <span></span>
      <span class="pts">${ptsDisplay}</span>
      <span class="elo">${p.e}</span>
      <span class="var ${vClass(p.v)}">${p.v>0?"+":""}${p.v||"-"}</span>
      <span class="search-icon" data-player="${esc(p.n)}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
    </div>`;
  }
  h+='</div>';
  el.innerHTML=h;
  bindSearchIcons();
}

// ─── RENDER ───
function render(){
  if(!data)return;
  updateDate();
  const el=$("#content");
  if(view==="ranking"){$('#tHeader').innerHTML='';renderRanking(el)}
  else renderTorneo(el);
}

// ─── SEARCH ICON → MODAL ───
function bindSearchIcons(){
  document.querySelectorAll('.search-icon').forEach(icon=>{
    icon.onclick=()=>{
      const name=icon.dataset.player;
      openHistory(name, view, rhythm);
    };
  });
}

// ─── SEARCH INPUT ───
document.getElementById('searchInput').addEventListener('input',e=>{
  searchTerm=e.target.value;
  render();
});

// ─── MODAL ───
function openHistory(playerName, ctx, filterRhythm){
  const hist=data?.historial?.[playerName];
  const ritmoLabel=ctx==='ranking'?filterRhythm:'';
  $('#modalTitle').textContent='HISTORIAL: '+playerName.toUpperCase()+(ritmoLabel?' ('+ritmoLabel+')':'');
  let body='';

  // Helper: compute oponentes from filtered partidas
  function computeOpps(partidas){
    const map={};
    for(const g of partidas){
      if(!map[g.opp])map[g.opp]={w:0,d:0,l:0};
      if(g.res==='1-0')map[g.opp].w++;
      else if(g.res==='0-1')map[g.opp].l++;
      else map[g.opp].d++;
    }
    return Object.entries(map).sort((a,b)=>{
      const ta=a[1].w+a[1].d+a[1].l,tb=b[1].w+b[1].d+b[1].l;
      return tb-ta;
    }).map(([nombre,s])=>{
      const total=s.w+s.d+s.l;
      const score=Math.round((s.w+.5*s.d)/total*100)||0;
      return{nombre,w:s.w,d:s.d,l:s.l,total,score:score+'%'};
    });
  }

  // Helper: compute totales from filtered partidas
  function computeTotals(partidas){
    const rm={};let gw=0,gd=0,gl=0;
    for(const g of partidas){
      const r=g.ritmo||'?';
      if(!rm[r])rm[r]={w:0,d:0,l:0};
      if(g.res==='1-0'){rm[r].w++;gw++}
      else if(g.res==='0-1'){rm[r].l++;gl++}
      else{rm[r].d++;gd++}
    }
    const list=[];
    for(const name of['Rapid','Blitz','Bullet']){
      const s=rm[name]||{w:0,d:0,l:0};
      const total=s.w+s.d+s.l;
      list.push({ritmo:name,w:s.w,d:s.d,l:s.l,total,pct:total?Math.round((s.w+.5*s.d)/total*100)+'%':'-'});
    }
    const gt=gw+gd+gl;
    list.push({ritmo:'General',w:gw,d:gd,l:gl,total:gt,pct:gt?Math.round((gw+.5*gd)/gt*100)+'%':'-'});
    return list;
  }

  if(ctx==='torneo'&&data?.torneo){
    // ── TORNEO VIEW: show tournament games with +/- ──
    const t=data.torneo;
    const ri=ritmoSvg(t.ritmo);
    const tp=data.torneo_partidas?.[playerName]||[];

    // 1) Tournament name as header + games table
    body+=`<div class="mtbl-title">${ri} ${esc(t.nombre)}${t.finalizado?'':' (En vivo)'}</div>`;
    body+=`<table class="mtbl"><thead><tr>
      <th>R</th><th class="c">C</th><th>Resultado</th><th class="r">+/-</th>
    </tr></thead><tbody>`;
    if(tp.length){
      for(const g of tp){
        const resClass=g.res==="1-0"?"res-w":g.res==="0-1"?"res-l":"res-d";
        const colClass=g.c==="B"?"color-w":"color-b";
        const hasV=g.v!==undefined&&g.v!==null;
        const vClass=hasV?(g.v>0?"up":g.v<0?"down":"flat"):"flat";
        const vStr=hasV?(g.v>0?'+'+g.v:g.v===0?'-':g.v):'-';
        body+=`<tr>
          <td style="color:var(--text3);font-size:11px">${g.ronda}</td>
          <td class="c ${colClass}" style="font-size:11px">${g.c}</td>
          <td><span class="${resClass}" style="font-weight:600">${g.res}</span> <span style="color:var(--text2)">vs</span> <span style="color:var(--text);font-weight:500">${esc(g.opp)}</span></td>
          <td class="r"><span class="var ${vClass}" style="font-size:11px">${vStr}</span></td>
        </tr>`;
      }
    }else{
      body+='<tr><td colspan="4" style="text-align:center;color:var(--text3)">Sin partidas en este torneo</td></tr>';
    }
    body+='</tbody></table>';

  }else if(hist){
    // ── RANKING VIEW: filtered by rhythm ──
    const filtTorneos=filterRhythm?(hist.torneos||[]).filter(t=>t.ritmo===filterRhythm):hist.torneos||[];
    const filtPartidas=filterRhythm?(hist.partidas||[]).filter(g=>g.ritmo===filterRhythm):hist.partidas||[];
    const filtOpps=computeOpps(filtPartidas);
    const filtTotals=computeTotals(filtPartidas);

    // 1) TORNEOS JUGADOS
    body+=`<div class="mtbl-title">Torneos Jugados</div>`;
    body+=`<table class="mtbl mtbl-torneos"><thead><tr>
      <th>Fecha</th><th class="r">Pos</th><th class="r">Pts</th><th>Torneo</th>
    </tr></thead><tbody>`;
    if(filtTorneos.length){
      for(const t of filtTorneos){
        body+=`<tr>
          <td>${esc(t.fecha)}</td>
          <td class="r">${t.pos.replace(/^(\d+)\//,'$1°/')}</td>
          <td class="r">${esc(t.pts)}</td>
          <td>${esc(t.nombre)}</td>
        </tr>`;
      }
    }else{
      body+='<tr><td colspan="4" style="text-align:center;color:var(--text3)">Sin torneos en '+esc(filterRhythm||'general')+'</td></tr>';
    }
    body+='</tbody></table>';

    // 2) PARTIDAS (separate columns with scroll wrapper)
    body+=`<div class="mtbl-title">Partidas</div>`;
    body+=`<div class="mtbl-scroll"><table class="mtbl mtbl-partidas"><thead><tr>
      <th>Fecha</th><th class="c">C</th><th>Res</th><th>Oponente</th><th>Torneo</th>
    </tr></thead><tbody>`;
    if(filtPartidas.length){
      for(const g of filtPartidas){
        const resClass=g.res==="1-0"?"res-w":g.res==="0-1"?"res-l":"res-d";
        const colClass=g.c==="B"?"color-w":"color-b";
        body+=`<tr>
          <td>${esc(g.fecha)}</td>
          <td class="c ${colClass}">${g.c}</td>
          <td><span class="${resClass}">${g.res}</span></td>
          <td class="opp-cell">${esc(g.opp)}</td>
          <td class="torneo-cell">${esc(g.torneo)}</td>
        </tr>`;
      }
    }else{
      body+='<tr><td colspan="5" style="text-align:center;color:var(--text3)">Sin partidas en '+esc(filterRhythm||'general')+'</td></tr>';
    }
    body+='</tbody></table></div>';

    // 3) OPONENTES FRECUENTES
    body+=`<div class="mtbl-title">Oponentes Frecuentes</div>`;
    body+=`<table class="mtbl"><thead><tr>
      <th>Oponente</th><th class="r">W</th><th class="r">D</th><th class="r">L</th><th class="r">Total</th><th class="r">Score</th>
    </tr></thead><tbody>`;
    if(filtOpps.length){
      for(const o of filtOpps){
        const scoreVal=parseFloat(o.score)||0;
        const scoreClass=scoreVal>=60?"score-good":scoreVal<40?"score-bad":"score-mid";
        body+=`<tr>
          <td>${esc(o.nombre)}</td>
          <td class="r res-w">${o.w}</td>
          <td class="r res-d">${o.d}</td>
          <td class="r res-l">${o.l}</td>
          <td class="r">${o.total}</td>
          <td class="r ${scoreClass}">${esc(o.score)}</td>
        </tr>`;
      }
    }else{
      body+='<tr><td colspan="6" style="text-align:center;color:var(--text3)">Sin oponentes</td></tr>';
    }
    body+='</tbody></table>';

    // 4) TOTALES POR RITMO
    body+=`<div class="mtbl-title">Resultados Totales</div>`;
    body+=`<table class="mtbl"><thead><tr>
      <th>Ritmo</th><th class="r">W</th><th class="r">D</th><th class="r">L</th><th class="r">Total</th><th class="r">%</th>
    </tr></thead><tbody>`;
    if(filtTotals.length){
      for(const r of filtTotals){
        const isGeneral=r.ritmo==="General";
        const style=isGeneral?'font-weight:700;color:var(--text)':'';
        const rClass=ritmoClass(r.ritmo);
        body+=`<tr style="${style}">
          <td class="${rClass}">${esc(r.ritmo)}</td>
          <td class="r res-w">${r.w}</td>
          <td class="r res-d">${r.d}</td>
          <td class="r res-l">${r.l}</td>
          <td class="r">${r.total}</td>
          <td class="r">${r.pct}</td>
        </tr>`;
      }
    }else{
      body+='<tr><td colspan="6" style="text-align:center;color:var(--text3)">Sin datos</td></tr>';
    }
    body+='</tbody></table>';

  }else{
    body='<p style="color:var(--text2);font-size:13px;text-align:center;padding:30px 0">Sin datos de historial</p>';
  }

  $('#modalBody').innerHTML=body;
  $('#modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  $('#modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

$('#modalClose').onclick=closeModal;
$('#modalOverlay').onclick=e=>{if(e.target===$('#modalOverlay'))closeModal()};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ─── FIREBASE ───
let fallbackTimer;
function useDemo(){
  if(firebaseOK)return;
  data=DEMO;
  renderTabs();
  render();
}

// Show demo immediately, Firebase overrides
fallbackTimer=setTimeout(useDemo,2000);

try{
  const app=initializeApp(firebaseConfig);
  const db=getDatabase(app);
  onValue(ref(db,"live"),snap=>{
    clearTimeout(fallbackTimer);
    const v=snap.val();
    if(v&&v.ranking){firebaseOK=true;data=v;renderTabs();render()}
    else{useDemo()}
  },err=>{
    clearTimeout(fallbackTimer);useDemo();
  });
}catch(e){
  clearTimeout(fallbackTimer);useDemo();
}

// Update Venezuela time every 30s when no Firebase timestamp
setInterval(()=>{if(!firebaseOK)updateDate()},30000);
</script>
</body>
</html>
