// ─── HELPERS DE NAVEGACIÓN DE TORNEOS ───
// Construye la lista de torneos navegables combinando:
//   1) Los torneos históricos extraídos de data.historial (cada jugador tiene .torneos[]).
//   2) El torneo actual data.torneo (puede ser el más reciente o uno en vivo).
// CLAVE: cada torneo se identifica por su NOMBRE (no por nombre+fecha), porque dos
// torneos pueden ocurrir el mismo día (ej. RR IV Rapid y Blitz Double RR I, ambos
// 04/07/2026) y no deben mezclarse.
// IMPORTANTE: los "Match X vs Y" NO son torneos, son partidos individuales. Se excluyen
// de la navegación de la pestaña Torneo (los matches se ven en la pestaña Matches).
function buildTorneosNav(){
  const map=new Map(); // clave: nombre → entry
  // Helper: detectar si un nombre corresponde a un match (no a un torneo real).
  const isMatchName=(nombre)=>typeof nombre==='string'&&nombre.startsWith('Match ');
  // 1) Histórico: cada jugador tiene su lista de torneos jugados.
  if(data?.historial){
    for(const hist of Object.values(data.historial)){
      const ts=Array.isArray(hist.torneos)?hist.torneos:[];
      for(const t of ts){
        if(!t||!t.nombre)continue;
        // EXCLUIR matches: no son torneos, no deben aparecer en la pestaña Torneo.
        if(isMatchName(t.nombre))continue;
        if(map.has(t.nombre))continue; // ya registrado por otro jugador
        map.set(t.nombre,{
          nombre:t.nombre,
          fecha:t.fecha||'',
          ritmo:t.ritmo||'Rapid',
          finalizado:(t.finalizado===undefined)?1:(t.finalizado?1:0),
          // rondas_totales viene del histórico (añadido por el script de generación).
          // Si no está, se inferirá contando partidas de ESE torneo (no de la fecha).
          ronda:t.rondas_totales||null,
          rondas_totales:t.rondas_totales||null
        });
      }
    }
  }
  // 2) Torneo actual (en vivo o más reciente).
  if(data?.torneo&&data.torneo.nombre){
    const t=data.torneo;
    // Buscamos la fecha del torneo actual en el histórico (para reutilizarla).
    let fecha=null;
    if(data.historial){
      for(const hist of Object.values(data.historial)){
        const found=(Array.isArray(hist.torneos)?hist.torneos:[]).find(x=>x.nombre===t.nombre);
        if(found&&found.fecha){fecha=found.fecha;break}
      }
    }
    if(!fecha){
      // Bug 7b fix: generar la fecha fallback en hora de Caracas (America/Caracas, UTC-4),
      // no en la zona horaria del navegador. Antes, un usuario fuera de VE veia la fecha
      // de creacion del torneo desplazada un dia. Usamos Intl.DateTimeFormat con timeZone
      // para obtener YYYY-MM-DD en Caracas de forma estable, y formateamos a DD/MM/YYYY.
      try{
        const fmt=new Intl.DateTimeFormat('en-CA',{timeZone:'America/Caracas',year:'numeric',month:'2-digit',day:'2-digit'});
        const [yyyy,mm,dd]=fmt.format(new Date()).split('-');
        fecha=dd+'/'+mm+'/'+yyyy;
      }catch(e){
        // Fallback: si Intl no soporta timeZone (navegadores muy viejos), usar UTC.
        const now=new Date();
        const dd=String(now.getUTCDate()).padStart(2,'0');
        const mm=String(now.getUTCMonth()+1).padStart(2,'0');
        const yyyy=now.getUTCFullYear();
        fecha=dd+'/'+mm+'/'+yyyy;
      }
    }
    map.set(t.nombre,{
      nombre:t.nombre,
      fecha:fecha,
      ritmo:t.ritmo||'Rapid',
      finalizado:t.finalizado?1:0,
      ronda:t.ronda||null,
      rondas_totales:t.rondas_totales||null,
      isCurrent:true
    });
  }
  // Convertir a array y ordenar por fecha ascendente (más antiguo primero).
  const arr=Array.from(map.values());
  arr.sort((a,b)=>cmpFecha(a.fecha,b.fecha));
  // Inferir rondas_totales cuando falte: máximo número de partidas de ESE torneo
  // entre los jugadores del histórico (filtrando por nombre, no por fecha).
  for(const entry of arr){
    if(entry.rondas_totales)continue;
    let max=0;
    if(data?.historial){
      for(const hist of Object.values(data.historial)){
        const partidas=(Array.isArray(hist.partidas)?hist.partidas:[]).filter(p=>p.torneo===entry.nombre);
        if(partidas.length>max)max=partidas.length;
      }
    }
    entry.rondas_totales=max||null;
    entry.ronda=entry.rondas_totales; // Si es histórico, está finalizado.
  }
  return arr;
}

// Compara fechas en formato dd/mm/yyyy. Devuelve <0 si a<b, >0 si a>b, 0 si iguales.
function cmpFecha(a,b){
  // Bug 7 fix: forzar un orden estable cuando una fecha falta (cadena vacia).
  // Antes, cmpFecha('','') devolvia 0 y Array.sort dejaba el orden indefinido,
  // provocando que torneos sin fecha aparecieran en posiciones aleatorias entre
  // renders. Convencion: las fechas vacias se consideran "mas recientes" (van al
  // final del orden ascendente).
  const A=a||'',B=b||'';
  if(!A&&!B)return 0;
  if(!A)return 1;  // A vacio → va despues de B
  if(!B)return -1; // B vacio → va despues de A
  const pa=A.split('/');const pb=B.split('/');
  if(pa.length===3&&pb.length===3){
    const ka=pa[2]+pa[1].padStart(2,'0')+pa[0].padStart(2,'0');
    const kb=pb[2]+pb[1].padStart(2,'0')+pb[0].padStart(2,'0');
    return ka.localeCompare(kb);
  }
  return A.localeCompare(B);
}

// Dado un entry de TORNEOS_NAV, construye un objeto torneo compatible con data.torneo
// (con .jugadores[] ya ordenado por posición). Para el torneo actual usa data.torneo tal cual.
// Para torneos históricos, reconstruye las posiciones a partir de data.historial.
// CLAVE: filtra partidas por p.torneo === navEntry.nombre (no por fecha) para no mezclar
// torneos del mismo día.
function buildTorneoData(navEntry){
  if(navEntry.isCurrent&&data?.torneo){
    return data.torneo;
  }
  const jugadoresMap=new Map();
  if(data?.historial){
    for(const [playerName,hist] of Object.entries(data.historial)){
      // Filtrar partidas por NOMBRE de torneo (clave única), no por fecha.
      let partidas=(Array.isArray(hist.partidas)?hist.partidas:[]).filter(p=>p.torneo===navEntry.nombre);
      // Bug B fix: si no hay coincidencia exacta (p.ej. el torneo fue renombrado en
      // el backend), normalizar nombres y reintentar. Mismo truco que openTorneoModal.
      if(partidas.length===0&&navEntry.nombre){
        const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s*\([^)]*\)\s*$/,'').trim();
        const target=norm(navEntry.nombre);
        if(target){
          partidas=(Array.isArray(hist.partidas)?hist.partidas:[]).filter(p=>norm(p.torneo)===target);
        }
      }
      if(partidas.length===0)continue;
      let pts=0;
      for(const p of partidas){
        // El "res" ya está desde la perspectiva del jugador: "1-0" = yo gané (1 pt),
        // "1/2" = tablas (0.5 pts), "0-1" = yo perdí (0 pts).
        if(p.res==='1-0')pts+=1;
        else if(p.res==='1/2'||p.res==='½-½'||p.res==='0.5-0.5')pts+=0.5;
      }
      // Buscar la entrada del torneo en hist.torneos[] para obtener posición oficial.
      // Bug B fix: si no hay coincidencia exacta, intentar por nombre normalizado.
      let torneoEntry=(Array.isArray(hist.torneos)?hist.torneos:[]).find(t=>t.nombre===navEntry.nombre);
      if(!torneoEntry&&navEntry.nombre){
        const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s*\([^)]*\)\s*$/,'').trim();
        const target=norm(navEntry.nombre);
        if(target){
          torneoEntry=(Array.isArray(hist.torneos)?hist.torneos:[]).find(t=>norm(t.nombre)===target);
        }
      }
      // Buscar categoría/municipio/ELO actual del jugador en data.ranking.
      let cat='-',mun='-',elo=0,foto=null;
      for(const rhythmKey of ['Rapid','Blitz','Bullet']){
        const found=(data.ranking?.[rhythmKey]||[]).find(p=>p.n===playerName);
        if(found){cat=found.cat||'-';mun=found.mun||'-';elo=found.e||0;foto=found.foto||null;break}
      }
      // ─── BUG FIX: rating histórico por torneo ───
      // Antes 'e' usaba siempre el rating ACTUAL (data.ranking), idéntico en
      // todos los torneos históricos navegados con los chevrones ‹ ›.
      // Ahora usamos 'ef' (rating_inicial + variacion_total de ESE torneo)
      // que envía sync_to_firebase.py en historial.torneos[].ef. Si no existe
      // (torneo muy viejo sin rating_inicial guardado), caemos al rating actual.
      // El 'v' también viene del backend (variacion_total del torneo), que es
      // el mismo valor que se muestra en el historial personal del jugador.
      const efHist=(torneoEntry&&typeof torneoEntry.ef==='number')?torneoEntry.ef:null;
      const vTorneo=(torneoEntry&&typeof torneoEntry.v==='number')?torneoEntry.v:0;
      jugadoresMap.set(playerName,{
        n:playerName,
        pts:pts,
        rj:partidas.length,
        e:(efHist!==null)?efHist:elo,
        v:vTorneo,
        mun:mun,
        cat:cat,
        foto:foto,
        pos:torneoEntry?torneoEntry.pos:''
      });
    }
  }
  // Si tenemos posiciones oficiales en hist.torneos[], usarlas como orden primario.
  // Ordenar: por posición oficial (si existe) ASC, fallback a pts DESC, fallback a ELO DESC.
  const jugadores=Array.from(jugadoresMap.values()).sort((a,b)=>{
    // Si ambos tienen pos oficial, comparar por número de posición.
    const posA=a.pos?parseInt(a.pos):null;
    const posB=b.pos?parseInt(b.pos):null;
    if(posA!=null&&posB!=null&&posA!==posB)return posA-posB;
    // Si solo uno tiene pos oficial, ese va primero.
    if(posA!=null&&posB==null)return -1;
    if(posB!=null&&posA==null)return 1;
    // Sin pos oficial: ordenar por pts DESC, luego ELO DESC.
    if(b.pts!==a.pts)return b.pts-a.pts;
    return (b.e||0)-(a.e||0);
  });
  jugadores.forEach((p,i)=>{p.r=i+1});
  return {
    nombre:navEntry.nombre,
    ritmo:navEntry.ritmo,
    ronda:navEntry.ronda||navEntry.rondas_totales||0,
    rondas_totales:navEntry.rondas_totales||0,
    finalizado:navEntry.finalizado,
    jugadores:jugadores
  };
}

// Inicializa/actualiza TORNEOS_NAV, TORNEOS_RITMOS_DISPONIBLES y torneoNavIdx.
// Se llama cada vez que llega data nueva (después de render).
// Filtra los torneos por el ritmo seleccionado (torneoRitmoFiltro). Si el filtro
// es null, se setea al primer ritmo disponible (preferiblemente el ritmo del torneo actual).
function syncTorneosNav(){
  // Construir lista completa de torneos (sin filtro de ritmo)
  const allNav=buildTorneosNav();
  // Calcular ritmos disponibles (ordenados: Rapid, Blitz, Bullet)
  const ritmosSet=new Set();
  for(const t of allNav){
    if(t.ritmo)ritmosSet.add(t.ritmo);
  }
  TORNEOS_RITMOS_DISPONIBLES=['Rapid','Blitz','Bullet'].filter(r=>ritmosSet.has(r));
  // Si no hay filtro activo o el filtro ya no tiene torneos, setear al primer ritmo disponible
  // (preferiblemente el ritmo del torneo actual data.torneo).
  if(!torneoRitmoFiltro||!TORNEOS_RITMOS_DISPONIBLES.includes(torneoRitmoFiltro)){
    const ritmoActual=data?.torneo?.ritmo;
    if(ritmoActual&&TORNEOS_RITMOS_DISPONIBLES.includes(ritmoActual)){
      torneoRitmoFiltro=ritmoActual;
    }else if(TORNEOS_RITMOS_DISPONIBLES.length>0){
      torneoRitmoFiltro=TORNEOS_RITMOS_DISPONIBLES[0];
    }else{
      torneoRitmoFiltro=null;
    }
  }
  // Filtrar por ritmo seleccionado
  TORNEOS_NAV=allNav.filter(t=>!torneoRitmoFiltro||t.ritmo===torneoRitmoFiltro);
  if(!TORNEOS_NAV.length){
    torneoNavIdx=0;
    return;
  }
  // Mantener el índice si es válido; si no, ir al más reciente.
  if(torneoNavIdx>=0&&torneoNavIdx<TORNEOS_NAV.length){
    torneoNavIdx=torneoNavIdx;
  }else{
    torneoNavIdx=TORNEOS_NAV.length-1; // más reciente por defecto
  }
}

// ─── RENDER TORNEO ───
function renderTorneo(el){
  // Sincronizar la lista de torneos navegables con la data más reciente.
  syncTorneosNav();
  if(!TORNEOS_NAV.length||!data?.torneo?.jugadores?.length){
    el.innerHTML=emptyState('Sin datos de torneo');
    return;
  }
  const navEntry=TORNEOS_NAV[torneoNavIdx];
  const t=buildTorneoData(navEntry);
  if(!t?.jugadores?.length){el.innerHTML=emptyState('Sin datos de torneo');return}
  const status=t.finalizado?'Finalizado':`Ronda ${t.ronda} / ${t.rondas_totales}`;
  // Etiqueta condicional sobre el primer jugador:
  //   - Torneo activo/en vivo → "Líder"
  //   - Torneo finalizado     → "Ganador"
  const leaderLabel=t.finalizado?'Ganador':'Líder';
  // ─── Header con navegación ───
  // Fila 1 (superior): selector de ritmo ‹ Rapid › — permite filtrar torneos por ritmo.
  // Fila 2 (inferior): navegador de torneos ‹ [título centrado] ›
  // Se usan iconos SVG feather-style (stroke=currentColor) en lugar de emojis ◀️▶️.
  const isFirst=torneoNavIdx===0;
  const isLast=torneoNavIdx===TORNEOS_NAV.length-1;
  // Chevron izquierdo (‹): apunta a la izquierda → torneo anterior (más antiguo).
  const prevSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>';
  // Chevron derecho (›): apunta a la derecha → torneo siguiente (más reciente).
  const nextSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>';
  const leftArrow=isFirst
    ?'<span class="t-nav-arrow disabled" aria-hidden="true">'+prevSvg+'</span>'
    :'<button class="t-nav-arrow" id="tNavPrev" type="button" aria-label="Torneo anterior" title="Torneo anterior">'+prevSvg+'</button>';
  // El chevron derecho se deshabilita cuando el usuario ya está en el torneo más reciente.
  const rightArrow=isLast
    ?'<span class="t-nav-arrow disabled" aria-hidden="true">'+nextSvg+'</span>'
    :'<button class="t-nav-arrow" id="tNavNext" type="button" aria-label="Torneo siguiente" title="Torneo siguiente">'+nextSvg+'</button>';
  // ─── Selector de ritmo (fila superior) ───
  // Muestra el ritmo actual con chevrones ‹ › para cambiar entre ritmos disponibles.
  // Solo se muestra si hay más de un ritmo disponible (si solo hay Rapid, no tiene sentido).
  let ritmoRowHtml='';
  if(TORNEOS_RITMOS_DISPONIBLES.length>0){
    const ritmoIdx=TORNEOS_RITMOS_DISPONIBLES.indexOf(torneoRitmoFiltro);
    const isLastRitmo=ritmoIdx>=TORNEOS_RITMOS_DISPONIBLES.length-1;
    const isFirstRitmo=ritmoIdx<=0;
    const multiRitmo=TORNEOS_RITMOS_DISPONIBLES.length>1;
    const ritmoPrevBtn=(!multiRitmo||isFirstRitmo)
      ?'<span class="t-nav-arrow disabled" aria-hidden="true">'+prevSvg+'</span>'
      :'<button class="t-nav-arrow" id="tRitmoPrev" type="button" aria-label="Ritmo anterior" title="Ritmo anterior">'+prevSvg+'</button>';
    const ritmoNextBtn=(!multiRitmo||isLastRitmo)
      ?'<span class="t-nav-arrow disabled" aria-hidden="true">'+nextSvg+'</span>'
      :'<button class="t-nav-arrow" id="tRitmoNext" type="button" aria-label="Ritmo siguiente" title="Ritmo siguiente">'+nextSvg+'</button>';
    ritmoRowHtml='<div class="t-ritmo-row">'+ritmoPrevBtn+
      '<span class="t-ritmo-label">'+esc(torneoRitmoFiltro||'—')+'</span>'+
      ritmoNextBtn+'</div>';
  }
  $('#tHeader').innerHTML=`<div class="t-header">
    ${ritmoRowHtml}
    <div class="t-nav-row">${leftArrow}<h2>${ritmoSvg(t.ritmo)} ${esc(cleanTorneoName(t.nombre))}</h2>${rightArrow}</div>
    <div class="meta">${status}</div>
  </div>`;
  // Mejora 9: Resumen rápido del torneo (con etiqueta condicional Líder/Ganador)
  const jugs=t.jugadores||[];
  const avgElo=jugs.length?Math.round(jugs.reduce((s,j)=>s+(j.e||0),0)/jugs.length):0;
  $('#tHeader').innerHTML+=`<div class="torneo-summary">
    <div class="torneo-stat"><div class="ts-label">Jugadores</div><div class="ts-value">${jugs.length}</div></div>
    <div class="torneo-stat"><div class="ts-label">Ronda</div><div class="ts-value">${t.ronda||'—'} / ${t.rondas_totales||'—'}</div></div>
    <div class="torneo-stat"><div class="ts-label">Rating Prom.</div><div class="ts-value">${avgElo}</div></div>
    <div class="torneo-stat"><div class="ts-label">${leaderLabel}</div><div class="ts-value">${esc(jugs[0]?.n||'—')}</div></div>
  </div>`;
  let h='<div class="table-wrap" id="torneoWrap">';
  for(const p of t.jugadores){
    // Bug 2 fix: escritura eliminada. playerIndex solo se usa en la vista ranking,
    // escribir aqui con datos de torneo contaminaba el indice.
    const ptsStr=p.pts%1===0?String(p.pts):p.pts.toFixed(1);
    const rj=p.rj||t.rondas_totales;
    const c=catColor(p.cat);
    const catTt=(p.cat&&p.cat!=='-')?`<span class="ptag" style="background:${c.bg};color:${c.fg}">${esc(p.cat)}</span>`:'';
    const munTt=(p.mun&&p.mun!=='-')?`<span class="ptag mtag">${esc(p.mun)}</span>`:'';
    const isChamp=t.finalizado&&p.r===1;
    // Badge flotante sobre el jugador #1: "Líder" si activo, "Ganador" si finalizado.
    const topBadge=(p.r===1)?`<div class="top-badge">${esc(t.finalizado?'Ganador':'Líder')}</div>`:'';
    h+=`<div class="trow" data-player="${esc(p.n)}" data-rhythm="${esc(t.ritmo||'')}" data-search="${esc(p.n.toLowerCase())}">
      <div class="rankbox"><div class="rk-n ${rc(p.r)}">${p.r}</div></div>
      ${avatarHtml(p)}
      <div class="pinfo">
        ${topBadge}
        <div class="pname${isChamp?' champ':''}">${esc(p.n)}</div>
        <div class="tags-row">${catTt}${munTt}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;min-width:36px;font-size:12px;font-weight:600;color:var(--text2)">${ptsStr}<span style="color:var(--text3)">/${rj}</span></div>
      <div class="pstats">
        <div class="prating">${p.e||'—'}</div>
        <div class="pdelta ${vClass(p.v)}">${fmtVariacion(p.v)}</div>
      </div>
    </div>`;
  }
  h+='<div class="empty-wrap hidden" id="torneoEmptyMsg"><p id="torneoEmptyText"></p>'+
    '<button id="resetSearchEmptyBtn" class="tab-btn hidden" style="margin-top:12px; max-width:180px; display:inline-block; border-radius:6px; background:var(--bg3); color:var(--text)">Restablecer búsqueda</button></div>';
  h+='</div>';
  el.innerHTML=h;
  bindPlayerRows();
  bindTorneoRows();
  applyTorneoVisibility();
  bindTorneoNav();
}

// ─── HANDLERS DE NAVEGACIÓN DE TORNEOS ───
function bindTorneoNav(){
  const prev=document.getElementById('tNavPrev');
  const next=document.getElementById('tNavNext');
  if(prev){
    prev.addEventListener('click',()=>{
      if(torneoNavIdx>0){
        torneoNavIdx--;
        render();
      }
    });
  }
  if(next){
    next.addEventListener('click',()=>{
      if(torneoNavIdx<TORNEOS_NAV.length-1){
        torneoNavIdx++;
        render();
      }
    });
  }
  // Handlers del selector de ritmo ‹ ›
  const ritmoPrev=document.getElementById('tRitmoPrev');
  const ritmoNext=document.getElementById('tRitmoNext');
  if(ritmoPrev){
    ritmoPrev.addEventListener('click',()=>{
      const idx=TORNEOS_RITMOS_DISPONIBLES.indexOf(torneoRitmoFiltro);
      if(idx>0){
        torneoRitmoFiltro=TORNEOS_RITMOS_DISPONIBLES[idx-1];
        // Resetear el índice del torneo al más reciente del nuevo ritmo
        torneoNavIdx=-1; // syncTorneosNav lo ajustará al más reciente
        render();
      }
    });
  }
  if(ritmoNext){
    ritmoNext.addEventListener('click',()=>{
      const idx=TORNEOS_RITMOS_DISPONIBLES.indexOf(torneoRitmoFiltro);
      if(idx>=0&&idx<TORNEOS_RITMOS_DISPONIBLES.length-1){
        torneoRitmoFiltro=TORNEOS_RITMOS_DISPONIBLES[idx+1];
        torneoNavIdx=-1; // reset al más reciente del nuevo ritmo
        render();
      }
    });
  }
}

// ─── VISIBILIDAD DEL TORNEO (no destructivo) ───
function applyTorneoVisibility(){
  const wrap=document.getElementById('torneoWrap');
  if(!wrap)return;
  const rows=wrap.querySelectorAll('.trow[data-player]');
  const term=searchTerm.trim().toLowerCase();
  const searching=term!=='';
  let visibleCount=0;
  rows.forEach(row=>{
    const name=row.dataset.search||'';
    const hide=searching&&!name.includes(term);
    row.classList.toggle('hidden',hide);
    if(!hide)visibleCount++;
  });
  const emptyMsg=document.getElementById('torneoEmptyMsg');
  if(emptyMsg){
    const show=visibleCount===0;
    emptyMsg.classList.toggle('hidden',!show);
    if(show){
      const textEl=document.getElementById('torneoEmptyText');
      const btnEl=document.getElementById('resetSearchEmptyBtn');
      if(textEl)textEl.textContent=searching?('Sin resultados para "'+searchTerm+'"'):'Sin jugadores';
      if(btnEl)btnEl.classList.toggle('hidden',!searching);
    }
  }
}

// ─── RENDER ───
let _lastView=null;
function render(){
  if(!data)return;
  // Bug fix: si el usuario está viendo el perfil de un jugador (#/jugador/Nombre) -ya
  // sea por carga directa de la URL con ese hash, o porque llega una actualización en
  // tiempo real de Firebase mientras esa vista sigue abierta- este render() general
  // solo actualizaba las vistas ocultas de ranking/torneo/partidas, dejando el perfil
  // visible vacío (si data no había llegado aún) o desactualizado (si ya estaba pintado
  // con datos viejos). Detectamos el hash y refrescamos también el perfil.
  const profileName=getProfileNameFromHash();
  if(profileName)renderFullPlayerProfile(profileName);
  // Reflow estructural inevitable (cambio de vista/tab, nuevos datos de Firebase):
  // se preserva la posición de scroll del viewport para evitar saltos visuales.
  const scrollY=window.scrollY;
  updateDate();
  const el=$("#content");
  const viewChanged=_lastView!==view;
  // Bug C fix: resetear prevData cuando cambia la vista. Antes, prevData conservaba
  // los ratings de la vista anterior y applyFlashClasses podia producir un flash
  // espureo en la primera actualizacion de Firebase tras el cambio de vista.
  if(viewChanged){
    prevData=null;
    // Bug E fix: cancelar el debounce pendiente del buscador al cambiar de vista,
    // para que no se aplique un filtro diferido en la nueva vista de forma sorpresiva.
    if(typeof _searchDebounceTimer!=='undefined'&&_searchDebounceTimer){
      clearTimeout(_searchDebounceTimer);
      _searchDebounceTimer=null;
    }
  }
  if(view==="ranking"){$('#tHeader').innerHTML='';renderRanking(el)}
  else if(view==="matches"){$('#tHeader').innerHTML='';$('#heroWrap').innerHTML='';renderMatches(el)}
  else{$('#heroWrap').innerHTML='';renderTorneo(el)}
  applyFlashClasses();
  prevData=JSON.parse(JSON.stringify(data));
  // Animación de fade-in solo cuando cambia la vista (no en cada update de Firebase)
  if(viewChanged){
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation='';
  }
  _lastView=view;
  requestAnimationFrame(()=>window.scrollTo(0,scrollY));
}

// ─── FILTRO DE BÚSQUEDA (no destructivo) ───
// Se invoca en cada keystroke del buscador: NO reconstruye #content.innerHTML,
// solo alterna la clase .hidden sobre las filas .prow/.trow/.mrow ya existentes
// en el DOM de la vista activa. Esto evita reflow completo, preserva el scroll
// del usuario y no destruye el foco del input de búsqueda.
function applySearchFilter(){
  if(!data)return;
  if(view==='ranking')applyRankingVisibility();
  else if(view==='torneo')applyTorneoVisibility();
  else if(view==='matches')applyMatchesVisibility();
}

// ─── FLASH DE ACTUALIZACIÓN: compara ratings actuales vs previos ───
function applyFlashClasses(){
  if(!prevData||!data)return;
  document.querySelectorAll('.prow[data-player],.trow[data-player]').forEach(row=>{
    const name=row.dataset.player;
    const rhythmAttr=row.dataset.rhythm||rhythm; // solo seteado en búsqueda global
    let currentRating=null;
    let previousRating=null;
    if(view==='ranking'){
      const found=(data.ranking?.[rhythmAttr]||[]).find(p=>p.n===name);
      if(found)currentRating=found.e;
      const prevFound=(prevData.ranking?.[rhythmAttr]||[]).find(p=>p.n===name);
      if(prevFound)previousRating=prevFound.e;
    }else if(view==='torneo'){
      // Bug 5 fix (revisado): usar el torneo ACTIVAMENTE VISUALIZADO (getActiveTournament),
      // no data.torneo (que siempre es el mas reciente). Si el usuario esta viendo
      // un torneo historico navegado con los chevrones, las ratings son estaticas
      // y no tiene sentido flashear; solo flasheamos si el torneo activo coincide
      // con el torneo en vivo de Firebase.
      // Bug A fix: la condicion original era demasiado restrictiva y NO flasheaba
      // cuando data.torneo no existia (entre torneos). Ahora flasheamos si:
      //   (1) el torneo activo coincide por nombre con data.torneo, O
      //   (2) data.torneo no existe pero el torneo activo tiene jugadores con rating.
      const tActivo=getActiveTournament();
      if(tActivo){
        const coincideConVivo=data?.torneo&&tActivo.nombre===data.torneo.nombre;
        const sinVivoPeroActivo=!data?.torneo&&(tActivo.jugadores||[]).length>0;
        if(coincideConVivo||sinVivoPeroActivo){
          const found=(tActivo.jugadores||[]).find(p=>p.n===name);
          if(found)currentRating=found.e;
          // prevData: si coincide con vivo, usar prevData.torneo; si no hay vivo,
          // reconstruir prevT activo con buildTorneoData sobre prevData.
          let prevJugs=null;
          if(coincideConVivo){
            prevJugs=prevData?.torneo?.jugadores||[];
          }else if(prevData&&typeof TORNEOS_NAV!=='undefined'&&TORNEOS_NAV&&TORNEOS_NAV.length){
            const navEntry=TORNEOS_NAV[torneoNavIdx];
            if(navEntry){
              // buildTorneoData lee de `data` global; para evitar reescribir globals,
              // hacemos una busqueda manual simplificada en prevData.historial.
              const prevHist=prevData?.historial||{};
              prevJugs=Object.values(prevHist).map(h=>{
                const parts=(Array.isArray(h.partidas)?h.partidas:[]).filter(p=>p.torneo===navEntry.nombre);
                if(parts.length===0)return null;
                let pts=0;
                for(const p of parts){if(p.res==='1-0')pts+=1;else if(p.res==='1/2'||p.res==='½-½'||p.res==='0.5-0.5')pts+=0.5;}
                const rnk=(prevData.ranking?.[navEntry.ritmo]||[]).find(x=>x.n===h.nombre||x.n===Object.keys(prevHist).find(k=>prevHist[k]===h));
                return {n:rnk?.n||'',e:rnk?.e||0};
              }).filter(Boolean);
            }
          }
          const prevFound=(prevJugs||[]).find(p=>p.n===name);
          if(prevFound)previousRating=prevFound.e;
        }
      }
    }
    if(currentRating!==null&&previousRating!==null&&currentRating!==previousRating){
      row.classList.remove('flash-up','flash-down');
      // forzar reflow para reiniciar la animación si la clase ya existía
      void row.offsetWidth;
      const dir=currentRating>previousRating?'flash-up':'flash-down';
      row.classList.add(dir);
      // Animación count-up del rating
      const ratingEl=row.querySelector('.prating');
      if(ratingEl)animateNumber(ratingEl,previousRating,currentRating);
      // Mejora 10: indicador de cambio reciente (persiste 30s)
      let dot=row.querySelector('.recent-dot');
      if(!dot){
        dot=document.createElement('span');
        dot.className='recent-dot '+(currentRating>previousRating?'up':'down');
        const pstats=row.querySelector('.pstats');
        if(pstats)pstats.appendChild(dot);
        else row.appendChild(dot);
      }
      clearTimeout(dot._hideTimer);
      dot._hideTimer=setTimeout(()=>{if(dot.parentNode)dot.remove()},30000);
    }else{
      // Sin cambio: remover dot si existe
      const existingDot=row.querySelector('.recent-dot');
      if(existingDot){clearTimeout(existingDot._hideTimer);existingDot.remove()}
    }
  });
}

// ─── RENDER MATCHES ───
function matchPlayerHtml(j, side, ritmo, isWinner){
  const deltaCls=j.v>0?'up':j.v<0?'down':'flat';
  const deltaTxt=(j.v>0?'+':'')+j.v;
  // Mini-badge "GANADOR" para el vencedor del match.
  // Se coloca ENCIMA del nombre (como primer hijo de .mp-info, antes de .mp-name),
  // centrado horizontalmente, para no ocultar ni truncar el nombre del jugador.
  // IMPORTANTE: para que los nombres de ambos jugadores queden a la MISMA altura
  // vertical, renderizamos SIEMPRE un elemento .win-badge (incluso para el perdedor),
  // pero con visibility:hidden cuando no es ganador. Así ambos .mp-info tienen el
  // mismo layout de 3 elementos (badge + nombre + delta) y los nombres se alinean.
  const winBadge=isWinner
    ?'<span class="win-badge">Ganador</span>'
    :'<span class="win-badge placeholder" aria-hidden="true">Ganador</span>';
  return `<div class="mplayer${side==='right'?' right':''}" data-player="${esc(j.n)}" data-rhythm="${esc(ritmo||'')}">
    ${avatarHtml(j)}
    <div class="mp-info">
      ${winBadge}
      <div class="mp-name">${esc(j.n)}</div>
      <div class="mp-delta">${j.ef} <span class="${deltaCls}">${deltaTxt}</span></div>
    </div>
  </div>`;
}

function renderMatches(el){
  const list=data.matches||[];
  if(!list.length){el.innerHTML=emptyState('Sin matches registrados');return}
  let h='<div class="table-wrap" id="matchesWrap">';
  for(const m of list){
    // Bug 2 fix: escrituras eliminadas. playerIndex solo se usa en la vista ranking.
    const s1=m.j1.score%1===0?String(m.j1.score):m.j1.score.toFixed(1);
    const s2=m.j2.score%1===0?String(m.j2.score):m.j2.score.toFixed(1);
    const np=m.np===1?'1 partida':`${m.np} partidas`;
    const search=(m.j1.n+' '+m.j2.n).toLowerCase();
    // Determinar el ganador del match comparando scores.
    // Solo marcamos ganador si hay uno claro (no en empates).
    const j1Wins=m.j1.score>m.j2.score;
    const j2Wins=m.j2.score>m.j1.score;
    h+=`<div class="mrow" data-search="${esc(search)}">
      <div class="mrow-top">
        <span class="mrow-ritmo">${ritmoSvg(m.ritmo)}${esc(m.ritmo)} · ${np}</span>
        <span class="mrow-date">${formatTimestamp(m.fecha)}</span>
      </div>
      <div class="mrow-players">
        ${matchPlayerHtml(m.j1,'left',m.ritmo,j1Wins)}
        <div class="mrow-score">${s1} – ${s2}</div>
        ${matchPlayerHtml(m.j2,'right',m.ritmo,j2Wins)}
      </div>
    </div>`;
  }
  h+='<div class="empty-wrap hidden" id="matchesEmptyMsg"><p id="matchesEmptyText"></p>'+
    '<button id="resetSearchEmptyBtn" class="tab-btn hidden" style="margin-top:12px; max-width:180px; display:inline-block; border-radius:6px; background:var(--bg3); color:var(--text)">Restablecer búsqueda</button></div>';
  h+='</div>';
  el.innerHTML=h;
  bindPlayerRows();
  applyMatchesVisibility();
}

// ─── VISIBILIDAD DE MATCHES (no destructivo) ───
function applyMatchesVisibility(){
  const wrap=document.getElementById('matchesWrap');
  if(!wrap)return;
  const rows=wrap.querySelectorAll('.mrow[data-search]');
  const term=searchTerm.trim().toLowerCase();
  const searching=term!=='';
  let visibleCount=0;
  rows.forEach(row=>{
    const hide=searching&&!row.dataset.search.includes(term);
    row.classList.toggle('hidden',hide);
    if(!hide)visibleCount++;
  });
  const emptyMsg=document.getElementById('matchesEmptyMsg');
  if(emptyMsg){
    const show=visibleCount===0;
    emptyMsg.classList.toggle('hidden',!show);
    if(show){
      const textEl=document.getElementById('matchesEmptyText');
      const btnEl=document.getElementById('resetSearchEmptyBtn');
      if(textEl)textEl.textContent=searching?('Sin resultados para "'+searchTerm+'"'):'Sin matches registrados';
      if(btnEl)btnEl.classList.toggle('hidden',!searching);
    }
  }
}

// ─── MODAL DE HISTORIAL DEL TORNEO (click en .trow del tab Torneo) ───
// Devuelve el torneo ACTUALMENTE VISUALIZADO por el usuario en la pestaña Torneo
// (que puede ser uno histórico si el usuario navegó con ◀️/▶️), no data.torneo
// (que siempre es el más reciente). Si TORNEOS_NAV no está inicializado, cae a data.torneo.
function getActiveTournament(){
  if(typeof TORNEOS_NAV!=='undefined'&&TORNEOS_NAV&&TORNEOS_NAV.length&&typeof torneoNavIdx!=='undefined'){
    const navEntry=TORNEOS_NAV[torneoNavIdx];
    if(navEntry){
      return buildTorneoData(navEntry);
    }
  }
  return data?.torneo||null;
}

function openTorneoModal(playerName){
  // Usar el torneo ACTIVAMENTE VISUALIZADO (que puede ser uno histórico navegado
  // con ◀️/▶️), no data.torneo (que siempre es el más reciente).
  const t=getActiveTournament();
  if(!t)return;
  const torneoName=t.nombre||'';
  const modal=document.getElementById('torneoModal');
  const title=document.getElementById('torneoModalTitle');
  const body=document.getElementById('torneoModalBody');

  title.textContent='HISTORIAL: '+playerName.toUpperCase();

  // Buscar partidas del jugador en este torneo.
  // Bug fix: si el torneo visualizado coincide con el torneo EN CURSO (data.torneo),
  // sus partidas más recientes pueden no estar todavía volcadas en
  // data.historial[playerName].partidas (ese nodo se sincroniza al finalizar el torneo).
  // Mientras tanto, las partidas en tiempo real viven en data.torneo_partidas[playerName],
  // así que esa es la fuente que debe consultarse PRIMERO. Si no hay nada ahí, se cae
  // al comportamiento anterior (leer del historial, filtrando por nombre de torneo).
  const esTorneoActual=!!(data?.torneo&&torneoName&&data.torneo.nombre===torneoName);
  const partidasEnVivo=esTorneoActual?data?.torneo_partidas?.[playerName]:null;
  let games=[];
  if(Array.isArray(partidasEnVivo)&&partidasEnVivo.length){
    games=partidasEnVivo;
  }else{
    const hist=data?.historial?.[playerName];
    if(hist&&Array.isArray(hist.partidas)){
      games=hist.partidas.filter(g=>g.torneo===torneoName);
      // Bug 3 fix: si no hay coincidencia exacta (p.ej. el torneo fue renombrado en
      // el backend, como 'Torneo Round Robin I' -> 'Round Robin I'), normalizar nombres
      // (minusculas, sin acentos, sin parentesis de fecha) y volver a intentar.
      if(games.length===0&&torneoName){
        const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s*\([^)]*\)\s*$/,'').trim();
        const target=norm(torneoName);
        if(target){
          games=hist.partidas.filter(g=>norm(g.torneo)===target);
        }
      }
    }
  }

  let h='<div class="mtbl-title">'+ritmoSvg(t.ritmo)+' '+esc(cleanTorneoName(torneoName))+'</div>';

  if(games.length){
    h+='<table class="mtbl"><thead><tr>'+
      '<th class="r">R</th><th class="c">C</th><th>Resultado</th><th>Oponente</th><th class="r">+/-</th>'+
      '</tr></thead><tbody>';
    games.forEach((g,i)=>{
      const resClass=g.res==='1-0'?'res-w':g.res==='0-1'?'res-l':'res-d';
      const colClass=g.c==='B'?'color-w':'color-b';
      const hasV=g.v!==undefined&&g.v!==null;
      const vCls=hasV?(g.v>0?'var(--green)':g.v<0?'var(--red)':'var(--text3)'):'var(--text3)';
      const vStr=hasV?(g.v>0?'+'+g.v:g.v===0?'-':g.v):'-';
      // Mostrar el número de ronda REAL del campo g.ronda (proveniente de la BD),
      // no el índice i+1 del array filtrado. Las partidas se muestran en orden
      // "más reciente primero" (ronda DESC), así que el índice no corresponde al
      // número de ronda real.
      const rondaNum=(g.ronda!==undefined&&g.ronda!==null)?g.ronda:'';
      h+='<tr>'+
        '<td class="r">'+rondaNum+'</td>'+
        '<td class="c '+colClass+'">'+esc(g.c||'')+'</td>'+
        '<td><span class="'+resClass+'">'+esc(g.res||'')+'</span></td>'+
        '<td>'+esc(g.opp||'')+'</td>'+
        '<td class="r" style="color:'+vCls+';font-weight:600">'+vStr+'</td>'+
        '</tr>';
    });
    h+='</tbody></table>';
  }else{
    h+='<p style="color:var(--text3);font-size:12px;padding:10px 0">Sin partidas registradas en este torneo.</p>';
  }

  body.innerHTML=h;
  modal.classList.add('open');
}

// ─── SEARCH INPUT (con debounce + botón de limpieza) ───
function debounce(func, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => func.apply(this, args), delay);
    // Bug E fix: exponer el timer en una variable global para poder cancelarlo
    // desde render() cuando cambia la vista. Sin esto, un keystroke seguido de
    // un cambio rapido de vista podia aplicar el filtro en la nueva vista de
    // forma sorpresiva 120ms despues.
    if(typeof _searchDebounceTimer!=='undefined')_searchDebounceTimer=timer;
  };
}
let _searchDebounceTimer=null;

// Debounce corto: el filtrado ya es barato (solo toggles de clase, sin innerHTML),
// así que no hace falta esperar demasiado para que se sienta instantáneo.
const debouncedSearch = debounce((val) => {
  searchTerm = val;
  applySearchFilter();
  _searchDebounceTimer=null;
}, 120);

// Helper: extrae el nombre del jugador desde el hash de la URL cuando el usuario
// está en la vista de perfil (#/jugador/{Nombre}); devuelve null si no aplica.
// Centraliza el parseo para que router() y render() detecten la vista de perfil
// de forma consistente (bug fix: render() necesita saber si debe refrescarla).
function getProfileNameFromHash(){
  const hash=window.location.hash||'';
  const m=hash.match(/^#\/jugador\/(.+)$/);
  if(!m)return null;
  let name;
  try{name=decodeURIComponent(m[1])}catch(e){name=m[1]}
  return name.replace(/_/g,' ');
}

// Helper: normalize tournament position string ("1/6" → "1°/6", etc.)
// Bug 11 fix: unificar la lista de campos en un solo sitio. Antes, el primer
// bloque no incluia `rank` ni `lugar`, asi que si el backend enviaba t.rank=3 sin
// t.pos, la funcion devolvia ''. El segundo bloque (que si los incluia) era codigo
// muerto porque solo se ejecutaba si raw estaba vacio, y raw ya cubria todos esos
// campos excepto rank/lugar. Ahora hay una sola lista unificada y no hay ramas muertas.
function formatPos(t){
  if(!t)return'';
  const raw=t.pos??t.POS??t.Pos??t.posicion??t.posición??t.position??t.puesto??t.rank??t.lugar;
  if(raw===undefined||raw===null||String(raw).trim()==='')return'';
  const s=String(raw).trim();
  const m=s.match(/(\d+)\s*(?:\/|-|de)\s*(\d+)/i);
  if(m)return m[1]+'°/'+m[2];
  if(/^\d+$/.test(s))return s+'°';
  return esc(s);
}

// Helper: extract a player's data from a specific rhythm
function findPlayerInRhythm(playerName,ry){
  const list=data?.ranking?.[ry]||[];
  return list.find(p=>p.n===playerName)||null;
}

// Helper: pick the player's "primary" rhythm (highest-rated one with data)
function primaryRhythmFor(playerName){
  let best=null,bestElo=-1;
  for(const ry of['Rapid','Blitz','Bullet']){
    const p=findPlayerInRhythm(playerName,ry);
    if(p&&(p.e||0)>bestElo){best=ry;bestElo=p.e||0}
  }
  return best||'Rapid';
}

// ─── MAIN PROFILE RENDERER ───
function renderFullPlayerProfile(playerName){
  const details=$('#profileDetails');
  if(!details)return;

  // Bug 1+8+9 fix: filtrar partidas de matches en TODAS las estadisticas del perfil.
  // Antes, este filtro se aplicaba solo en la lista de Partidas Recientes y en la
  // tabla de Torneos Jugados, pero NO en: (1) el calculo de W/D/L del fallback,
  // (2) la racha (streak), (3) la mejor victoria. Resultado: las cifras de la
  // tarjeta de Performance no cuadraban con las partidas visibles, y la racha o
  // mejor victoria podian acabar siendo de un match particular en vez de un torneo.
  const isMatchEntry=(nombre)=>typeof nombre==='string'&&nombre.startsWith('Match ');

  // Gather player data across all rhythms
  const rhythms={Rapid:findPlayerInRhythm(playerName,'Rapid'),
                 Blitz:findPlayerInRhythm(playerName,'Blitz'),
                 Bullet:findPlayerInRhythm(playerName,'Bullet')};
  const hist=data?.historial?.[playerName]||null;
  const anyRhythm=rhythms.Rapid||rhythms.Blitz||rhythms.Bullet;
  const primaryRhythm=primaryRhythmFor(playerName);
  const pRef=anyRhythm||hist||{n:playerName};

  // ─── HEADER (avatar + name + tags) ───
  const c=catColor(pRef.cat);
  const catT=(pRef.cat&&pRef.cat!=='-')?`<span class="ptag" style="background:${c.bg};color:${c.fg}">${esc(pRef.cat)}</span>`:'';
  const munT=(pRef.mun&&pRef.mun!=='-')?`<span class="ptag mtag">${esc(pRef.mun)}</span>`:'';
  const flagT=pRef.mun&&pRef.mun!=='-'?flagHtml(pRef.mun):'';
  let headHtml=`<div class="pprofile-head">
    ${avatarHtml({...pRef,n:playerName},'lg')}
    <div class="pprofile-title">
      <div class="pprofile-name">${esc(playerName)}</div>
      <div class="pprofile-tags">${flagT||''}${catT}${munT}</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:18px">
    <button class="share-btn" id="shareProfileBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartir perfil
    </button>
  </div>`;

  // ─── MULTI-RHYTHM RATING CARDS ───
  let cardsHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Ratings por Ritmo</div>'+
    '<div class="rhythm-cards">';
  for(const ry of['Rapid','Blitz','Bullet']){
    const p=rhythms[ry];
    const ico=ritmoSvg(ry);
    if(p){
      const vCls=p.v>0?'up':p.v<0?'down':'flat';
      const vTxt=(p.v>0?'+':'')+(p.v||0);
      cardsHtml+=`<div class="rhythm-card" data-ritmo="${ry}">
        <div class="rc-label">${ico} ${ry}</div>
        <div class="rc-elo">${p.e}</div>
        <div class="rc-meta">
          <span class="rc-rank">Rank <b>#${p.r}</b></span>
          <span class="rc-delta ${vCls}">${vTxt}</span>
        </div>
      </div>`;
    }else{
      cardsHtml+=`<div class="rhythm-card inactive" data-ritmo="${ry}">
        <div class="rc-label">${ico} ${ry}</div>
        <div class="rc-elo">Unrated</div>
        <div class="rc-meta">
          <span class="rc-rank">Sin ranking</span>
          <span class="rc-delta flat">—</span>
        </div>
      </div>`;
    }
  }
  cardsHtml+='</div></div>';

  // ─── ELO EVOLUTION CHART (Chart.js) ───
  // Construye una serie por ritmo con UN PUNTO POR PARTIDA (no por torneo).
  // Cada punto representa el rating DESPUÉS de esa partida.
  //
  // Lógica CORRECTA (usa rating_inicial de cada torneo como anclaje):
  // 1. Para cada ritmo, recogemos las partidas del jugador en ese ritmo (filtrando
  //    por torneo → buscar el ritmo en hist.torneos[]).
  // 2. Ordenamos las partidas cronológicamente (más antigua primero).
  // 3. Para CADA PARTIDA, calculamos el rating después usando el rating_inicial
  //    del torneo al que pertenece + la suma acumulada de variaciones hasta esa
  //    partida (dentro del mismo torneo).
  //    Esto da una serie de N puntos (uno por partida) que termina en el rating
  //    actual del jugador en ese ritmo.
  //
  // IMPORTANTE: no reconstruimos hacia atrás desde el rating actual (eso acumula
  // error porque las variaciones se calculan con Glicko-2 y el rating_inicial de
  // cada torneo ya refleja el estado real del jugador al empezar ese torneo).
  // Usamos los rating_inicial de cada torneo como puntos de anclaje verificables.
  //
  // Las etiquetas del eje X son las fechas de cada partida (formato dd/mm/yyyy),
  // alineadas a la serie más larga para que los ritmos sean comparables.
  const datasets=[];
  const rhythmColors={Rapid:'#8BC34A',Blitz:'#ffc107',Bullet:'#e040fb'};
  let maxLen=0;

  // Mapa: nombre de torneo → {ritmo, rating_inicial, fecha_inicio}
  // para poder anclar cada partida al rating_inicial correcto de su torneo.
  const torneoInfo={};
  if(hist&&Array.isArray(hist.torneos)){
    for(const t of hist.torneos){
      if(t.nombre){
        torneoInfo[t.nombre]={
          ritmo:t.ritmo||'Rapid',
          ratingInicial:typeof t.rating_inicial==='number'?t.rating_inicial:1500,
          fechaInicio:t.fecha||''
        };
      }
    }
  }

  for(const ry of['Rapid','Blitz','Bullet']){
    const p=rhythms[ry];
    let series=[];
    let labelsForSeries=[];
    if(hist&&Array.isArray(hist.partidas)){
      // Filtrar partidas de este ritmo usando el mapa torneo→ritmo
      let games=hist.partidas.filter(g=>{
        const info=torneoInfo[g.torneo];
        const ritmoTorneo=info?info.ritmo:'Rapid';
        return ritmoTorneo===ry;
      });
      if(games.length){
        // Ordenar cronológicamente (más antigua primero).
        // Para ordenar correctamente usamos (fecha, fecha_inicio_torneo, ronda).
        // Necesitamos fecha_inicio del torneo para desempatar torneos del mismo día.
        games=[...games].map(g=>{
          const info=torneoInfo[g.torneo]||{};
          return {g, _fechaInicio:info.fechaInicio||'', _ritmo:info.ritmo||'Rapid'};
        }).sort((a,b)=>{
          const fa=a.g.fecha||'';const fb=b.g.fecha||'';
          const pa=fa.split('/');const pb=fb.split('/');
          let ka='0',kb='0';
          if(pa.length===3)ka=pa[2]+pa[1].padStart(2,'0')+pa[0].padStart(2,'0');
          if(pb.length===3)kb=pb[2]+pb[1].padStart(2,'0')+pb[0].padStart(2,'0');
          if(ka!==kb)return ka.localeCompare(kb);
          // Misma fecha: ordenar por fecha_inicio del torneo ASC
          if(a._fechaInicio!==b._fechaInicio)return a._fechaInicio.localeCompare(b._fechaInicio);
          // Mismo torneo: ordenar por ronda ASC
          return (a.g.ronda||0)-(b.g.ronda||0);
        });

        // Reconstruir ratings usando rating_inicial de cada torneo como anclaje.
        // Para cada partida, buscamos el rating_inicial del torneo al que pertenece,
        // y sumamos las variaciones acumuladas de las partidas anteriores DENTRO
        // DEL MISMO TORNEO más la variación de esta partida.
        // Mantenemos un acumulador por torneo: {torneo_nombre: {ratingInicial, sumaVariacionesHastaAhora}}
        const torneoAcumulador={}; // torneo_nombre → suma de variaciones ya procesadas
        const ratings=[];
        for(const item of games){
          const g=item.g;
          const info=torneoInfo[g.torneo]||{ratingInicial:1500};
          if(!torneoAcumulador[g.torneo]){
            torneoAcumulador[g.torneo]={ratingInicial:info.ratingInicial, suma:0};
          }
          const acc=torneoAcumulador[g.torneo];
          const v=(typeof g.v==='number')?g.v:0;
          acc.suma+=v;
          // Rating después de esta partida = rating_inicial del torneo + suma acumulada
          const ratingDespues=acc.ratingInicial+acc.suma;
          ratings.push(Math.round(ratingDespues));
        }
        series=ratings;
        labelsForSeries=games.map(item=>item.g.fecha||'');
      }
    }
    if(series.length>=2){
      datasets.push({
        label:ry,
        data:series,
        _labels:labelsForSeries,
        borderColor:rhythmColors[ry],
        backgroundColor:rhythmColors[ry]+'22',
        borderWidth:2,
        tension:.3,
        pointRadius:2.5,
        pointHoverRadius:5,
        pointBackgroundColor:rhythmColors[ry],
        pointBorderColor:'#121212',
        pointBorderWidth:1,
        fill:false
      });
      if(series.length>maxLen)maxLen=series.length;
    }
  }

  // Construir etiquetas del eje X: usamos las fechas de la serie más larga.
  let xLabels=[];
  if(maxLen){
    let longestDs=datasets[0];
    for(const ds of datasets){
      if(ds.data.length>longestDs.data.length)longestDs=ds;
    }
    xLabels=(longestDs._labels||[]).slice();
    while(xLabels.length<maxLen)xLabels.unshift('');
  }

  let chartHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Evolución del Rating</div>'+
    '<div class="chart-container">';
  if(datasets.length){
    chartHtml+=`<canvas id="ratingChart"></canvas>`;
  }else{
    chartHtml+='<div class="chart-empty">Sin datos suficientes para graficar la evolución.</div>';
  }
  chartHtml+='</div></div>';

  // ─── PERFORMANCE ANALYTICS ───
  let totales=[];
  if(hist&&Array.isArray(hist.totales)&&hist.totales.length){
    totales=hist.totales;
  }else if(hist&&Array.isArray(hist.partidas)){
    // Bug 1 fix: filtrar matches para que W/D/L coincida con las partidas visibles.
    const partidasFiltradas=hist.partidas.filter(g=>!isMatchEntry(g.torneo));
    let w=0,d=0,l=0;
    for(const g of partidasFiltradas){
      if(g.res==='1-0')w++;
      else if(g.res==='0-1')l++;
      else d++;
    }
    const t=w+d+l;
    totales=[{ritmo:'General',w,d,l,total:t,pct:t?Math.round((w+.5*d)/t*100)+'%':'-'}];
  }

  // ─── MEJORA 5: Calcular racha actual (streak) ───
  // Lógica: iterar desde la partida MÁS RECIENTE hacia atrás.
  // - Cuenta partidas consecutivas con el mismo resultado (solo victorias o solo derrotas).
  // - Las tablas (o cualquier resultado distinto) rompen la racha INMEDIATAMENTE,
  //   incluso si ocurren en la primera partida (racha = 0).
  // Ejemplo: [derrota, tablas, ...] → racha = 1 derrota (no "2 victorias").
  // IMPORTANTE: hist.partidas ya viene ordenado "más reciente primero" desde el script
  // de generación (ordena por fecha_torneo DESC, fecha_inicio_torneo DESC, ronda DESC).
  // NO reordenamos aquí para no romper ese orden (el intento anterior con b.i-a.i
  // invertía el orden dentro de la misma fecha y daba rachas incorrectas cuando
  // había múltiples torneos el mismo día).
  let streakHtml='';
  if(hist&&Array.isArray(hist.partidas)&&hist.partidas.length){
    // Bug 8 fix: filtrar matches antes de calcular la racha.
    const games=hist.partidas.filter(g=>!isMatchEntry(g.torneo));
    let streakType=null; // 'win' o 'loss'
    let streakCount=0;
    for(const g of games){
      const isWin=g.res==='1-0';
      const isLoss=g.res==='0-1';
      const isDraw=!isWin&&!isLoss; // tablas: "1/2", "½-½", etc.
      // Las tablas rompen la racha inmediatamente, haya o no tipo definido.
      if(isDraw)break;
      if(!streakType){
        // Primera partida no-tablas: define el tipo de racha.
        streakType=isWin?'win':'loss';
        streakCount=1;
      }else if((isWin&&streakType==='win')||(isLoss&&streakType==='loss')){
        // Mismo resultado: extiende la racha.
        streakCount++;
      }else{
        // Resultado distinto (victoria después de derrotas o viceversa): rompe.
        break;
      }
    }
    // Una racha SEMÁNTICAMENTE requiere 2 o más partidas consecutivas con el mismo
    // resultado. "1 victoria consecutiva" o "1 derrota consecutiva" no es una racha,
    // es solo la última partida. Si streakCount < 2, ocultamos la tarjeta por completo
    // para que solo aparezca cuando realmente exista una racha activa.
    if(streakType&&streakCount>=2){
      const icon=streakType==='win'?'🔥':'❌';
      const label=streakType==='win'?'Racha de victorias':'Racha de derrotas';
      const txt=streakCount+' '+ (streakType==='win'?'victoria'+(streakCount===1?'':'s'):'derrota'+(streakCount===1?'':'s'))+' consecutiva'+(streakCount===1?'':'s');
      streakHtml=`<div class="streak-card" style="margin-bottom:10px">
        <div class="streak-icon">${icon}</div>
        <div class="streak-info">
          <div class="streak-label">${label}</div>
          <div class="streak-value ${streakType}">${txt}</div>
        </div>
      </div>`;
    }
  }

  let perfHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Rendimiento</div>'+
    streakHtml+
    '<div class="perf-grid">';
  for(const t of totales){
    const ry=t.ritmo;
    const total=t.total||0;
    const w=t.w||0,d=t.d||0,l=t.l||0;
    let pctNum=0;
    if(typeof t.pct==='string'){
      const m=t.pct.match(/(\d+)/);
      if(m)pctNum=+m[1];
    }else if(typeof t.pct==='number'){
      pctNum=t.pct;
    }
    const winPct=total?Math.round(w/total*100):0;
    const drawPct=total?Math.round(d/total*100):0;
    const lossPct=total?Math.round(l/total*100):0;
    const winDrawPct=winPct+drawPct;
    const ico=['Rapid','Blitz','Bullet'].includes(ry)?ritmoSvg(ry):'';
    perfHtml+=`<div class="perf-card" data-ritmo="${esc(ry)}">
      <div class="pc-title">${ico} ${esc(ry)} <span class="pc-ritmo-tag">${total} partidas</span></div>
      <div class="wdl-row">
        <div class="wdl-cell win"><div class="wdl-num">${w}</div><div class="wdl-label">Victorias</div><div class="wdl-pct">${winPct}%</div></div>
        <div class="wdl-cell draw"><div class="wdl-num">${d}</div><div class="wdl-label">Tablas</div><div class="wdl-pct">${drawPct}%</div></div>
        <div class="wdl-cell loss"><div class="wdl-num">${l}</div><div class="wdl-label">Derrotas</div><div class="wdl-pct">${lossPct}%</div></div>
      </div>
      <div class="perf-bar" title="Victorias ${winPct}% · Tablas ${drawPct}% · Derrotas ${lossPct}%">
        <div class="progress-track">
          <div class="progress-fill win" style="width:${winPct}%"></div>
          <div class="progress-fill draw" style="width:${drawPct}%"></div>
          <div class="progress-fill loss" style="width:${lossPct}%"></div>
        </div>
      </div>
    </div>`;
  }
  perfHtml+='</div></div>';

  // ─── TOURNAMENTS TABLE ───
  // Filtramos los "Match X vs Y" del frontend: los matches SÍ están en los datos
  // (para alimentar el gráfico de evolución del rating) pero NO deben mostrarse
  // en la tabla de Torneos Jugados ni en Partidas Recientes.
  // Nota: isMatchEntry está definido al inicio de renderFullPlayerProfile (Bug 1+8+9 fix).
  const torneos=(hist?.torneos||[]).filter(t=>!isMatchEntry(t.nombre));
  let torneosHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Torneos Jugados</div>';
  if(torneos.length){
    torneosHtml+='<div class="pprofile-table-scroll"><table class="pprofile-table"><thead><tr>'+
      '<th class="r">Pos</th><th class="r">Pts</th><th>Torneo</th><th class="r">Ritmo</th>'+
      '</tr></thead><tbody>';
    for(const t of torneos){
      const posStr=formatPos(t)||'<span style="color:var(--text3)">—</span>';
      const ico=t.ritmo?ritmoSvg(t.ritmo):'';
      torneosHtml+=`<tr>
        <td class="r">${posStr}</td>
        <td class="r">${esc(t.pts)}</td>
        <td><div style="font-weight:500;color:var(--text)">${esc(cleanTorneoName(t.nombre))}</div><div style="font-size:10px;color:var(--text3);margin-top:1px">${esc(t.fecha)}</div></td>
        <td class="r">${ico}<span style="font-size:10px">${esc(t.ritmo||'—')}</span></td>
      </tr>`;
    }
    torneosHtml+='</tbody></table></div>';
  }else{
    torneosHtml+='<p style="color:var(--text3);font-size:12px;padding:10px 0">Sin torneos registrados.</p>';
  }
  torneosHtml+='</div>';

  // ─── RECENT GAMES TABLE (with pagination) ───
  // Filtramos las partidas de matches (torneo empieza con "Match ") del frontend.
  // Los matches se procesan en el backend para el gráfico pero no se muestran aquí.
  const partidas=(hist?.partidas||[]).filter(g=>!isMatchEntry(g.torneo));
  // Bug fix: PAGE_LIMIT se eleva a este scope (en vez de quedar declarado dentro del
  // if de abajo) porque el handler del filtro por torneo, más adelante en esta misma
  // función, también necesita conocer el límite de paginación. partidasExpanded
  // recuerda si el usuario ya hizo clic en "Ver más partidas" en ESTA visualización
  // del perfil, para que el filtro "Todos" no vuelva a mostrar todo sin paginar.
  const PAGE_LIMIT=10;
  let partidasExpanded=false;
  let partidasHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Partidas Recientes</div>';
  if(partidas.length){
    // Mejora 8: filtro por torneo
    const torneoNames=[...new Set(partidas.map(g=>g.torneo).filter(Boolean))];
    if(torneoNames.length>=2){
      partidasHtml+='<div class="filter-chips" id="partidasFilter">'+
        '<button class="filter-chip active" data-torneo="all">Todos ('+partidas.length+')</button>';
      for(const tn of torneoNames){
        const count=partidas.filter(g=>g.torneo===tn).length;
        partidasHtml+='<button class="filter-chip" data-torneo="'+esc(tn)+'">'+esc(cleanTorneoName(tn))+' ('+count+')</button>';
      }
      partidasHtml+='</div>';
    }
    partidasHtml+='<div class="pprofile-table-scroll"><table class="pprofile-table" id="partidasTbl"><thead><tr>'+
      '<th>Fecha</th><th class="c">C</th><th class="c">Res</th><th>Oponente</th><th class="r">+/-</th><th>Torneo</th>'+
      '</tr></thead><tbody>';
    partidas.forEach((g,i)=>{
      const resClass=g.res==="1-0"?"res-w":g.res==="0-1"?"res-l":"res-d";
      const colClass=g.c==="B"?"color-w":"color-b";
      const hasV=g.v!==undefined&&g.v!==null;
      const vCls=hasV?(g.v>0?"up":g.v<0?"down":"flat"):"flat";
      const vStr=hasV?(g.v>0?'+'+g.v:g.v===0?'-':g.v):'-';
      const hiddenAttr=i>=PAGE_LIMIT?' style="display:none"':'';
      partidasHtml+=`<tr${hiddenAttr} class="partida-row" data-torneo="${esc(g.torneo||'')}">
        <td>${esc(g.fecha||'')}</td>
        <td class="c ${colClass}">${esc(g.c||'')}</td>
        <td class="c"><span class="${resClass}" style="font-weight:600">${esc(g.res||'')}</span></td>
        <td>${esc(g.opp||'')}</td>
        <td class="r"><span class="var ${vCls}">${vStr}</span></td>
        <td style="font-size:10px;color:var(--text3)">${esc(cleanTorneoName(g.torneo))}</td>
      </tr>`;
    });
    partidasHtml+='</tbody></table></div>';
    if(partidas.length>PAGE_LIMIT){
      const restantes=partidas.length-PAGE_LIMIT;
      partidasHtml+=`<div style="text-align:center;padding:10px 0 4px"><button id="verMasPartidasBtn" class="tab-btn" style="max-width:240px;margin:0 auto;display:inline-block;border-radius:6px;background:var(--bg3);color:var(--text)">Ver más partidas (${restantes} restantes)</button></div>`;
    }
  }else{
    partidasHtml+='<p style="color:var(--text3);font-size:12px;padding:10px 0">Sin partidas registradas.</p>';
  }
  partidasHtml+='</div>';

  // ─── OPPONENTS TABLE ───
  const opps=hist?.oponentes||[];
  let oppsHtml='<div class="pprofile-section">'+
    '<div class="pprofile-section-title">Oponentes Frecuentes</div>';
  if(opps.length){
    oppsHtml+='<div class="pprofile-table-scroll"><table class="pprofile-table"><thead><tr>'+
      '<th>Oponente</th><th class="r">W</th><th class="r">D</th><th class="r">L</th><th class="r">Total</th><th class="r">Score</th>'+
      '</tr></thead><tbody>';
    for(const o of opps){
      let pctStr='—';
      if(typeof o.score==='string'){
        const m=o.score.match(/(\d+)\s*%/);
        if(m)pctStr=m[1]+'%';
        else if(/^\d+$/.test(o.score.trim()))pctStr=o.score.trim()+'%';
        else pctStr=esc(o.score);
      }
      const scoreNum=parseInt(pctStr,10);
      const scoreCls=!isNaN(scoreNum)&&scoreNum>=60?"score-good":!isNaN(scoreNum)&&scoreNum<40?"score-bad":"score-mid";
      oppsHtml+=`<tr>
        <td>${esc(o.nombre)}</td>
        <td class="r res-w">${o.w||0}</td>
        <td class="r res-d">${o.d||0}</td>
        <td class="r res-l">${o.l||0}</td>
        <td class="r">${o.total||0}</td>
        <td class="r ${scoreCls}">${pctStr}</td>
      </tr>`;
    }
    oppsHtml+='</tbody></table></div>';
  }else{
    oppsHtml+='<p style="color:var(--text3);font-size:12px;padding:10px 0">Sin oponentes registrados.</p>';
  }
  oppsHtml+='</div>';

  // ─── MEJORA 7: Mejor victoria ───
  let bestWinHtml='';
  if(hist&&Array.isArray(hist.partidas)&&hist.partidas.length){
    // Bug 9 fix: filtrar matches antes de buscar la mejor victoria.
    const partidasFiltradas=hist.partidas.filter(g=>!isMatchEntry(g.torneo));
    let bestWin=null;
    let bestElo=-1;
    for(const g of partidasFiltradas){
      if(g.res==='1-0'&&typeof g.opp_elo==='number'&&g.opp_elo>bestElo){
        bestElo=g.opp_elo;bestWin=g;
      }
    }
    // Si no hay opp_elo, buscar en oponentes frecuentes el rating más alto al que le ganó
    if(!bestWin&&hist.oponentes&&hist.oponentes.length){
      for(const o of hist.oponentes){
        if(o.w>0&&typeof o.elo==='number'&&o.elo>bestElo){
          bestElo=o.elo;bestWin={opp:o.nombre,fecha:'',torneo:'',opp_elo:o.elo};
        }
      }
    }
    if(bestWin&&bestElo>0){
      bestWinHtml='<div class="pprofile-section"><div class="pprofile-section-title">Mejor Victoria</div>'+
        '<div class="best-win-card">'+
        '<div class="bw-icon">⭐</div>'+
        '<div class="bw-info">'+
        '<div class="bw-label">Victoria contra el rival más fuerte</div>'+
        '<div class="bw-opp">vs '+esc(bestWin.opp)+' ('+bestElo+' ELO)</div>'+
        '<div class="bw-meta">'+(bestWin.fecha?esc(bestWin.fecha):'')+(bestWin.torneo?' · '+esc(cleanTorneoName(bestWin.torneo)):'')+'</div>'+
        '</div></div></div>';
    }
  }

  // ─── ASSEMBLE ───
  details.innerHTML=headHtml+cardsHtml+chartHtml+perfHtml+bestWinHtml+torneosHtml+partidasHtml+oppsHtml;

  // ─── RENDER CHART (if canvas present) ───
  if(_profileChart){_profileChart.destroy();_profileChart=null}
  const canvas=document.getElementById('ratingChart');
  if(canvas&&datasets.length&&window.Chart){
    // Defensive: getContext('2d') can return null in restricted environments
    // (e.g., JSDOM without canvas package, or browsers with hardware accel disabled).
    const ctx=canvas.getContext('2d');
    if(ctx){
      datasets.forEach(ds=>{
        const grad=ctx.createLinearGradient(0,0,0,260);
        grad.addColorStop(0,ds.borderColor+'66');
        grad.addColorStop(1,ds.borderColor+'00');
        ds.backgroundColor=grad;
        ds.fill=true;
      });
    }
    _profileChart=new Chart(ctx||canvas,{
      type:'line',
      data:{labels:xLabels,datasets},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{
            display:true,
            position:'top',
            align:'end',
            labels:{
              color:'#999',
              font:{family:'Inter',size:11,weight:'600'},
              boxWidth:12,
              boxHeight:12,
              padding:10,
              usePointStyle:true,
              pointStyle:'circle'
            }
          },
          tooltip:{
            backgroundColor:'#1e1e1e',
            borderColor:'#333',
            borderWidth:1,
            titleColor:'#fff',
            bodyColor:'#e0e0e0',
            titleFont:{family:'Inter',size:12,weight:'700'},
            bodyFont:{family:'Inter',size:11,weight:'500'},
            padding:10,
            displayColors:true,
            boxPadding:4,
            callbacks:{
              title:items=>{
                const label=items[0].label;
                return label||'';
              },
              label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y} ELO`
            }
          }
        },
        scales:{
          x:{
            grid:{color:'#2a2a2a',drawTicks:false},
            ticks:{color:'#888',font:{family:'Inter',size:10}},
            border:{color:'#333'}
          },
          y:{
            grid:{color:'#2a2a2a',drawTicks:false},
            ticks:{color:'#888',font:{family:'Inter',size:10},callback:v=>v},
            border:{color:'#333'}
          }
        },
        elements:{line:{borderJoinStyle:'round'}}
      }
    });
  }

  // ─── PAGINATION: "Ver más partidas" button ───
  const verMasBtn=document.getElementById('verMasPartidasBtn');
  if(verMasBtn){
    verMasBtn.onclick=()=>{
      document.querySelectorAll('#partidasTbl .partida-row').forEach(r=>{r.style.display=''});
      partidasExpanded=true;
      verMasBtn.remove();
    };
  }

  // ─── MEJORA 2: Compartir perfil ───
  const shareBtn=document.getElementById('shareProfileBtn');
  if(shareBtn){
    shareBtn.onclick=()=>{
      const url=window.location.href;
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(()=>showToast('Enlace copiado al portapapeles'));
      }else{
        const ta=document.createElement('textarea');
        ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();
        try{document.execCommand('copy');showToast('Enlace copiado al portapapeles')}
        catch(e){showToast('No se pudo copiar')}
        document.body.removeChild(ta);
      }
    };
  }

  // ─── MEJORA 8: Filtro por torneo en partidas ───
  const filterWrap=document.getElementById('partidasFilter');
  if(filterWrap){
    filterWrap.addEventListener('click',e=>{
      const chip=e.target.closest('.filter-chip');
      if(!chip)return;
      filterWrap.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      const torneoFilter=chip.dataset.torneo||'all';
      // Bug D fix: al filtrar por un torneo especifico, ocultar el boton "Ver mas"
      // y mostrar todas las partidas de ese torneo (sin paginacion, porque el
      // conteo del boton ya no aplica). Al volver a "Todos", restaurar la
      // paginacion segun partidasExpanded y actualizar el texto del boton con
      // el conteo restante real.
      const verMasBtn=document.getElementById('verMasPartidasBtn');
      const allRows=document.querySelectorAll('#partidasTbl .partida-row');
      if(torneoFilter==='all'){
        // Mostrar segun paginacion
        allRows.forEach((r,i)=>{
          r.style.display=(!partidasExpanded&&i>=PAGE_LIMIT)?'none':'';
        });
        // Restaurar boton si aplica
        if(verMasBtn){
          if(partidasExpanded||allRows.length<=PAGE_LIMIT){
            verMasBtn.style.display='none';
          }else{
            verMasBtn.style.display='';
            const restantes=allRows.length-PAGE_LIMIT;
            verMasBtn.textContent='Ver más partidas ('+restantes+' restantes)';
          }
        }
      }else{
        // Filtrar por torneo: mostrar solo las de ese torneo, todas a la vez
        allRows.forEach(r=>{
          r.style.display=r.dataset.torneo===torneoFilter?'':'none';
        });
        // Ocultar boton "Ver mas" porque ya no aplica la paginacion
        if(verMasBtn)verMasBtn.style.display='none';
      }
    });
  }
}

// ─── MEJORA 2: Toast global ───
function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── HASH ROUTER ───
function router(){
  const name=getProfileNameFromHash();
  const profileEl=$('#playerProfile');
  const homeEls=[
    $('#content'),
    document.querySelector('.search-wrap'),
    document.querySelector('.tabs'),
    $('#heroWrap'),
    $('#tHeader'),
    document.querySelector('.live-bar'),
    document.querySelector('.date-bar'),
    document.querySelector('.header')
  ].filter(Boolean);

  if(name){
    if(profileEl.classList.contains('hidden')){
      _homeScrollY=window.scrollY;
    }
    homeEls.forEach(el=>el.classList.add('hidden'));
    profileEl.classList.remove('hidden');
    renderFullPlayerProfile(name);
    window.scrollTo(0,0);
  }else{
    // Bug fix (fuga de memoria): al salir de la vista de perfil de vuelta al inicio,
    // destruimos la instancia de Chart.js en lugar de dejarla activa en memoria con
    // sus listeners/ResizeObserver aunque el canvas ya no esté en la vista visible.
    if(_profileChart){
      _profileChart.destroy();
      _profileChart=null;
    }
    profileEl.classList.add('hidden');
    homeEls.forEach(el=>el.classList.remove('hidden'));
    if(_homeScrollY){
      requestAnimationFrame(()=>window.scrollTo(0,_homeScrollY));
      _homeScrollY=0;
    }
  }
}

window.addEventListener('hashchange',router);
window.addEventListener('load',router);
window.addEventListener('popstate',router);

// ─── BACK BUTTON ───
document.addEventListener('click',e=>{
  const btn=e.target.closest('#backToHomeBtn');
  if(!btn)return;
  if(window.location.hash){
    window.location.hash='';
  }else{
    router();
  }
});


// ─── FIREBASE ───
const FALLBACK_TIMEOUT_MS=5000; // buffer para redes lentas 3G/4G antes de mostrar Demo
let fallbackTimer;
let demoActive=false; // true si el estado Demo llegó a pintarse por timeout

// Transición suave del contenido (usada cuando Firebase llega tarde, tras el Demo)
function fadeSwapRender(fn){
  const el=$('#content');
  if(!el){fn();return}
  el.classList.add('fading');
  setTimeout(()=>{
    fn();
    requestAnimationFrame(()=>el.classList.remove('fading'));
  },220);
}

function useDemo(){
  if(firebaseOK)return;
  // Mejora 6: intentar cargar desde localStorage antes de usar demo
  try{
    const cached=localStorage.getItem('falconLiveCache');
    if(cached){
      const parsed=JSON.parse(cached);
      if(parsed&&parsed.ranking){
        demoActive=true;
        data=parsed;
        renderTabs();render();
        document.getElementById('offlineBar').classList.add('show');
        return;
      }
    }
  }catch(e){}
  demoActive=true;
  data=DEMO;
  renderTabs();
  render();
}

// Muestra Demo solo si Firebase no respondió dentro del umbral (skeleton permanece visible hasta entonces)
fallbackTimer=setTimeout(useDemo,FALLBACK_TIMEOUT_MS);

try{
  const app=initializeApp(firebaseConfig);
  const db=getDatabase(app);

  onValue(ref(db,"live"),snap=>{
    clearTimeout(fallbackTimer);
    const v=snap.val();
    if(v&&v.ranking){
      const wasDemo=demoActive&&!firebaseOK;
      firebaseOK=true;
      demoActive=false;
      data=v;
      // Mejora 6: guardar en localStorage y ocultar barra offline
      try{localStorage.setItem('falconLiveCache',JSON.stringify(v))}catch(e){}
      document.getElementById('offlineBar').classList.remove('show');
      if(wasDemo){
        // Firebase resolvió después de que el fallback ya pintó el Demo: transición limpia con fade
        fadeSwapRender(()=>{renderTabs();render()});
      }else{
        renderTabs();render();
      }
    }else{
      useDemo();
    }
  },err=>{
    clearTimeout(fallbackTimer);useDemo();
  });

  // ── MONITOREO DE CONEXIÓN EN TIEMPO REAL (.info/connected) ──
  // .info/connected fires `false` on first subscription (before the first
  // connection is established). We only mark the app as offline AFTER we've
  // successfully connected at least once, to avoid a false "SIN CONEXIÓN"
  // flash during initial load.
  const connectedRef=ref(db,".info/connected");
  onValue(connectedRef,(snap)=>{
    if(snap.val()===true){
      isOffline=false;
      wasConnected=true;
      // Mejora 6: ocultar barra offline al reconectar
      document.getElementById('offlineBar').classList.remove('show');
    }else{
      isOffline=wasConnected;
      // Mejora 6: mostrar barra offline si ya habíamos estado conectados
      if(wasConnected)document.getElementById('offlineBar').classList.add('show');
    }
    updateDate();
  });
}catch(e){
  clearTimeout(fallbackTimer);useDemo();
}

// Update Venezuela time every 30s when no Firebase timestamp
setInterval(()=>{if(!firebaseOK)updateDate()},30000);

// ─── BOTÓN "VOLVER ARRIBA" ( Mejora 5 ) ───
// Aparece tras scrollear >600px. Click → scroll suave al top.
(function(){
  const topBtn=document.getElementById('topBtn');
  if(!topBtn)return;
  let ticking=false;
  window.addEventListener('scroll',()=>{
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(()=>{
      const show=window.scrollY>600;
      topBtn.classList.toggle('show',show);
      ticking=false;
    });
  },{passive:true});
  topBtn.addEventListener('click',()=>{
    window.scrollTo({top:0,behavior:'smooth'});
  });
